front:
  text: 質中論主即荅一徵偈去義義竟而顯泠而熱風中熟觸非法人吹火物也餘觸香也論主義則不然觸无立属也善随人即風香取厶異身六大意如此侘崎决之來者義矣𭂫三稱汝小小異他人可人我可此弟三也此下娑外道小上外道義然賢是故論主决之四徵委是地人非餘三大大等中各人者風中人熟等觸非吹小以八也觸尒香成異質香矣應如是分別水等異上弟三意品意弟三科也此品凢卄一勾明意而去初十六分明賢時去後五夢中无死矣色入相品上四大同是徵徵四徵以成質所以七品明禪五祖俱用四大以成然是故十品通解令五塵同是實實然不同各然故名品各別釋者也入相者以前色相品直釋十四種會尼品但明一色可見故安入入者真生眼識𩂜生眼識𩂜則異上色相品也五塵以生五識制名制名不用者味觸此三事同知青黃即青生識識所約青色也香則不然識但香而約栴檀等栴檀等是假四通名故也但約不約人者矣故經云青黃色名色入者眼入滅色相是𩂜應當知佛告諸比丘我今為汝略說十二八至意入滅法相離是𩂜應當知今論主引此經論說五塵然矣別無滅者等寂滅也離者空之異辞耳若能如此約之二空記漏盖真是𩂜故云是𩂜應當知也此出雜阿含經相品此為三種一明无果以不成餘質像故二說矣本人人欲使質中恒入但未入緣三說因非因離色等等不相離者自下七者明无果俗中常無者明因品因凡十事前七事由後三明非因矣香品說眾香合更生異香初科也人衛世師人此下身四事耶次中為求那不必地獨為是第二科次為四事明小中乃香是第三科次說他經驃以下意品捴難外道四大求那不定應難風中為香略身汝言反覆有過若地觸當定難与水合故本觸不失者便不約地變變者異本身一過也若地与水合更生異觸乃變小与為合之泠滅更生熟者外為變而汝經中說但地為變水无則違經人一過過多故云反覆為過也識論中立无數品所以次色論議者論主解伏伏語中自人說諸法相生次弟自方明聖人觀行次弟觀行次弟促塵至細色陰是對焉無相寄塵在先也受陰苦樂受等身境㓛因中塵次之想陰想像𥁞麼因中塵次受也行陰為貪瞋等寄塵故不可在識陰後行捨等无量細心數故不在受想前故次想也識耳境淺而故罝後矣問曰如上觀行塵至細義則應尒但聖人分五陰㑅四念觀類如上心念𩂜應後以法念𩂜境中入麼乃細想与貪瞋等便應行捨等又量心數便細入塵故不可在心念𩂜後乃細故不可在色受念𩂜之前豈不類荅曰四念𩂜中可以不類者舌義乃異也以行陰觀猶是此法觀行塵未正相玄法念𩂜觀心㕘无色為中道寂玄絕故一向細受名豈可以行陰纇令次色論識明相生次弟可以託情塵生識也可以五門成識論之實及數是識論之𭛹故云中数品无迦旃延人別然之數非為不乃先後心數也無為則異心之不心品中心數卄一无賀然一心皆无中多成諍云无者无異心數可消心心生名心數心禪論貪畣佛語豈不妙心意識體一而名異論師訓釋此事不同一師云心謝過去生後名意現在識別六度名識能各心不當扵過現一師云後名意分別名識能緣義名心名義促異云然一者一念知之然然上為此三名三義義即論也弗弗曾已一故三義但異異然而究之未曾異未曾異故雖三而恒一可謂一非一故一三故三正一三一之三故一豈容異三之故三豈容異一是故不可聞三便謂天性楚熱聞一便渾然不可分然如此之釋卷是雜心舊解愚意謂扵論主之意何以知意然法中云能緣法故為識種能緣是心義分別是識義者豈可心義禪識義也而論主以能緣法名語者當知心識然義則不異但名中為異故能緣是意矣內云入中云意入者心是捨心是為意入不異上釋可矣如此例多當論意云然一者一能緣然名為三如眼目二名自揚欲矽異見先畣三名以园實者明无別然心數欲使意与識同无下四門同類尒問曰若能緣然一名三者識陰可約名意心陰也十二入中可約名心識入也荅曰既然一名為三𩂜𩂜身舉身如解意入者心是𩂜非識入也大既如是豈可盛問曰若名果而然一者何故十二入中意入者心是便𭣣心𥁞更無受想行心數在注入中五陰中識陰則不攝三陰以此義推豈不名義俱異答曰雖然即名異而法門不因十二入明義以情塵分法為十二入意入者心是以心是能緣能緣然非墮五塵但身意以對法所以身心收𥁞五陰中能緣然身法為淺深初淺者制議筭深制行所以識陰收法不𥁞身非是名義俱異而不𥁞也若法能緣是名為心迦旃延人以禪王主為心能緣等所能不阻名令論主先破此義决心所以異扵木石者以能緣集熟名心目豈必能神王主名心也故下異人驚即約若以能緣名心者受想心毅應是心俱能緣故可約尒也荅曰受想皆心別名知道品此是論主明无別然心數之大意如道品中一念五名約𥪰深淺淺名念乃至深名念然覺支今心尒問境淺名心小深名想受深境深名貪一慧緣四境名四知直以境異故智異心為此義一㝎種種名者此以所除制名念尒陰一境攀一境受名初生名心後者名数汝以若名字破心我以名字破心論主前章以能緣名心心差別名心无別然心外眾舉此言汝若以䏻緣名字破我心者我當以䏻緣名字名心都蕪心破心然既无不約言都是能緣名心心差別名也无相應品此品凡四門明无異人一時中各為別然相應初明因果法尒不問俱乃下以六識决之若六識不約俱生卄一法是心法不約俱生弟二眼見色已不身相次弟法尒下以必生意識决之若五識中已入想爭等分別者何湏生意識也必湏生意者故五識時无想受也弟三明應細相違下以苦樂貪恚决之弟四始七菩提分意品引佛經證次弟不俱生經言相應者四心次弟生用辨一事名為相應耳見是見等者凢五識心現法名見見中无故云見是見无想受別心也汝言煩惱染心故相應无有此理舉上異人第八證為別然一時相應勾非之外道計神王主性自淨以与貪使俱生故貪染此淨心若不俱生前心自滅煩惱自生初不相及云何言深論主今破此言无為此理者一心一次弟緣云並生為深无此理也為為之法生時即滅言先性淨貪求染汙便為一法可染是當常害法相也計性淨貪求染不異上十論中可借被破破此故所以云彼應荅此也若心本性汙貪恚何為情也既云淨不可尒便謂性汙者不尒也若性入是汙者貪恚无㓛故云何為也汝言心垢故眾生垢此論主决一時相應眾義汝煩惱汙心便計俱生而生染者如經中說心垢故眾生垢然眾生可以相應善眾生不可相應者煩惱心垢不約一時相應也汙相續故說名染心法實生滅道分前心自滅後貪心曰生曰生答此非染也而佛無貪染淨心者直此相似續種類不歎可約一二故無本淨心㑅今不淨故無汙行相續染心身非謂一時俱生為染也既相然續中入染解救心上尒從之可故矣多心品異人計心當一随生故多眼識不滅至身中以眼身六根故𩂜𩂜何名随生多生實當一下以長夜猶心死上生為證此人所随當見故論主破之破一故云相續中可然又次弟緣一心何嫌也法相在心力能了知不以住故異人計之情耳塵要湏蹔住約境已議若恚忿忿中滅老云何境如人彎弓射鹿時要住部中莫如今論主確立所為四百生滅一了然相也在心然在六識後生故無在心也力能了也六想為識所資故了境非蹔住故約了也阡陌如若就一念以生滅各反四生滅尒境是如初識初託境主乃至後識託後境生生時即了識何能滅了境境与心細分則无名既不能了境不約名識境不曰識所了不約名色故百論云法法自塵无𩂜以實分時則无罔矣非初不離初非後不離後四勾求法都无了㓛是明誰誰而了者四百生滅者初者難滅實相資導所傳授同一種類非後想故都名一念者一了之異名勾以假辨識四百生滅都為了法之㓛矣以此義推識与色香等都是假但不以異法成識不以想成色不以香成所以扵因成假名實法即受門為六識所資但說無者略可識託觀根塵生故無所假待矣想陰品前色多種釋者色是識害識是眾或也本所以多名分別然是眾或之本所以一品者若扵相見相乃至俱生不俱生如上識陰入別若扵相生惑之心受門論釋是故但一品也次識生故次明之也身假法相故名為想凡無所以能緣不約法實名想想門中明一切心行境无非是想是故論主無身假法名然身假法名然者不無然稱徹解万法无非假名中道不一不異橫執一異多少為定實名然故下云實无多少萬法等法人少八勝𩂜觀入人多是十一切入觀人无量若四无量心觀无所入四空空觀无扵者四倒重或也此等𢙣皆行險所攝所以乃此中解者門中做法時身非置位在陰也如真諦中說无記以業義同故及之不成同業感果又以想三種差別身緣此如置陰位位在過𢘤想想後生三受受生三毒錄在想陰上𢙣等在行陰也問曰身假法焉想是事不然者上起是過患之云此想能断三界煩惱了生断過之本云何想為過下別經證想非過也荅曰此實是兼以想名說者荅引經為證夫断結之道實汝兼之以約理受名故身然以身法受備扵断結道也而經四所以云然断結者以无當断是兼之初問初以无當剖法使空空断是兼故以无說耳以此業推為過也問曰汝無想身假法然以何為相者上一科明想然此第二科明無所緣相下明一切都是相能緣者已想還位也一過去此是異人所行禪此五法是相緣此者是想言過去已滅非色無色言假呈現對等約㝵名色心法万尒二老未來事同過去三者名字如𥁞必𥁞人等是假假現約名因者相生相生色生生假生相約生名滅住異尒者人人者我經三也㑅因受果之稱今與五陰依此我約人名名假論主先破弟五次破弟四餘三可盡類破無人是假者乃以因五陰成故名假非因實人約名三也相无成因故者生相扵色无成因假非矣問曰相義云何上論主既破異人相為非便兼為義相故令假㑅回也荅曰緣即是相者論主明一切都是相乃至无生中理是相能緣相者便是相想問說法下還罝想位在苐二心生受受生煩惱者受論中受相品論受凡乃六品故曰受論中者受相品是六中之一曰中又受相者此一品明苦受是實樂受不苦不樂受是三界苦因云何頼尒時為一苦受後為物情關三受乃至百人八難後不同然世俗名相扵苦中名樂捨受尒此二是名貴品論此義也若增身心是名為樂者身者五識心者竝三界道悅境中生心便止並而不都名樂苦受念受尒受名扵一切都是受問說受非罝受陰位也故知樂受无將欲明樂受是偽名心苦故名樂然若過增復為人患苦矣何樂之有荅世俗名相故有樂心寒苦故名樂實則是苦苦是實樂捨是偽名顯然也若實无樂何得說三此下第二假作異人執佛諸別七勾說三受是實夫約法相理窮名佛佛說三受說苦受樂說樂受何為不約異苦是為樂受苦受名是一實若實无樂佛何以說三也荅曰若實有樂受應說其相此下弟三非是所證揔荅若異苦別有樂應說真相相不可說當知扵苦中名樂苦中名樂佛說為樂受經无所也所以一切切都樂扵樂中生苦以决一切都苦苦中生樂亮公䟽已委釋生不𣸪記之行苦行夫心行緣為境所轉念念動求莫非是苦但聖人方便引吸開三受門刀杖傷𡧱生心名苦受也扵苦中可淂名約名悅悅中生心名為樂受非適非不適中生心為不苦不樂受矣相凡夫扵此三生着既無樂受觀出無便云此樂異苦為之是故如來以五苦門點壞三受一切悉苦矣何者前之苦受苦中之左重故与苦名名苦苦也之樂受生住是樂滅壞則生人苦名樂受為壞苦壞苦者是因中說果猶如擲塸難未至也已名破也經中說當觀樂受為壞苦者也大意政遣凡夫計樂之情矣非適非不適心是捨受此是生滅動求是行行境故苦行苦也三苦既立一切心行莫不苦矣曰如上探苦受等三是聖人引之辞而凡夫便著三受空粗故復以三苦壞前三受苦受是苦中之重名苦苦等一受一苦而泥洹經則不然苦受具三苦餘二受為各二苦者何也荅曰聖人制教不同若直以三苦壞凡夫死者三受也苦各拾對一受受既分眾生㝵執幹重不同故異泥洹經所明苦受三苦者是錄是性今當苦緣遍已四生受一受義為三苦矣何者苦受生苦中之重名苦苦此苦受生為壞並乎等是樂受具必為難散壞緣名壞苦此苦有行緣則苦名行苦三苦備矣餘二受二苦者此二受既是眾生勝果報所以同无苦苦也樂受必壞名壞苦行緣必動求之勞名行苦捨受乃至非想備二推上可曰經中說凡夫領扵樂緣名樂受尒時無苦所以名樂受為壞苦者樂受緣是因中語果名樂受此樂散則苦苦壞緣中生壞名苦取仁者乃名樂受為心壞苦豈不謬荅曰天經分當求經之大不著名隨相為永謬之談也心者如仁者之意刀杖苦緣生苦心名苦苦散壞生苦心名壞苦如此類心說一苦但分一苦受為三苦樂受捨受初不苦矣經中又說緣不定受定受辨苦豈可約无失樂緣則生人苦名樂勝名壞苦矣進退無據寧可約二受無苦今請正宗論之凡欲立三苦先定三受相何者苦受者三界中約適中生心樂受者三界適中生心也非適不中生心名捨受以此義推苦受壞時樂是三受中樂受樂受壞時苦是三受中苦受以三苦受門也名向者樂受壞苦苦受苦中之尤重苦苦矣云何乃名苦苦壞苦但是苦受生不同自乃苦緣中生自乃樂受壞後生或捨受後生苦苦矣此凡夫所凡夫領緣之樂聖人觀以為苦可謂樂受為壞苦捨受行緣名行苦此三受既別三苦異豈不妙人一解三受三苦佛出世唯說三皆苦一苦受也而羣生迷惑與情無地十苦受者何在也是故聖人開三受門語其異海也凡不尚能滅身心者迷名苦增益身心適境中生心者名樂受非適不適生心者名不苦不樂受上佛既開苦中為樂或有便謂異苦為樂是以故佛以三苦門壞前苦受也今分苦約三刀杖傷害生人苦故名苦因此生苦心是即則苦苦生名苦苦矣衣服七𭹀等生人樂名樂此教壞生人苦心苦壞生名壞苦焉无苦色樂色是色壞時生大憂苦餘險尒是明證也約空无我理出觀見乃為起動之心是行行生苦名苦行矣凡夫雖為此苦不覺聖人制名焉是則三苦然色是具必也前境同是苦緣不同當時逼惱是苦苦緣散壞是壞苦緣生滅処動是行苦散矣辨三受品上已解三受三苦但受相未分明可解故後以五科明三受義故名辨三受品第一明為三受弟二明三三受攝一切心弟三明无漏受苦弟四置受陰位弟五為是人論義明三受生煩惱所以𥼶有三受者以人計但為有苦樂可覺捨受天人能覺故无如優陀夷為五山王說三受波斯匿王但無有二二人俱共論佛耳判佛廣釋為三之比品初由為生乃三受耳問曰若以觸因故有三受者一切心行皆名為受此下苐二名受攝一切心所以尒者以迦旃延人計受是十大地中一法分明領受境名受者一切心行境莫非是受下以十十八意行為證意行不出十八明攝心𥁞樂分者三受通六識樂為喜下二尒也故知緣及諸相但能生苦者既明三受攝一切心將欲以三苦收三受故先明十四種色是質㝵法計豈可以苦樂語舌性也所以名苦者塵是緣具根是依具名苦耳下三以明苦也問曰無漏諸受是苦也三明无苦所以明者以迦旃延无渴難才苦復名名道今明三受所攝焉約非苦云何別有諸心法此下弟四始直受陰住住在弟三心也荅曰即是一受緣中行異故有差別即是一受者受名受緣扵一切心行境悉受矣而所以為四陰別識以初約境分別為名相假名二是識受始約好惡識他貪瞋尒前二心所未約好惡之深今始約是識皆為初但置識陰位初約壞故餘三設名不說想以能緣不約法實名想以此推之四心悉是耶緣都是想但置想陰初約假名執捉名想餘無不說受名扵緣四心悉受置受陰在弟三心始受好𢙣餘三不說貪瞋是業業是思思造作未來生死名行五受陰悉是行但弟四心生死彊名行陰前三心名无記可謂緣中行異故有四陰別也此之一禪四陰以同實而相避迴制四名也諸心法至此如先說此一解直四境矣故四陰約異也是一切法在身中時人解四陰所以約異每因約境有淺深利益人乃差別淺者名識乃至深者名行也又多以心䏻起煩惱人解三受品䏻生三煩惱名受陰前三受攝一切心是佛受門中說法時非受陰者何故宣說樂中貪使迦旃延人計一一受三使使以雖論主樂受起時貪与无明俱生㑅想應使使瞋㑅緣使使緣使難多且對三為三樂受為三使使何以宣說一受中一使使也樂既三苦受三推之可知荅曰苦受不應貪荅曰迦旃延人也汝貪云明緣苦受苦以逼惱為然云何扵中生貪樂受以悅適為壞何約而瞋瞋使不約緣使樂受貪不約緣使苦受云何約一一受三使使也癡一切𩂜使𦗟舌无明使三受雖尒意異彼人三使使三受論主受生三使使人貪是苦橫生樂是无明㑅行招苦果說苦生瞋是无明不苦不樂受實是勳求是苦不知是苦无明之㓛三受生无明使使人可有此理也問曰但扵苦樂中生癡異人欲使但苦樂二受中生无明所以尒者實是苦橫生樂心㑅行感苦果而生瞋无明扵受中不應无明使以聖人常行捨心是故此受不應有无明使下引經成之経無計受苦樂二受故無語若不苦不樂一受何以無也荅曰此経自說者論主以所引反質此經中說扵不苦不樂无明使使心識此受計以為泥洹何等也扵餘事不知者異人不受此無何以扵餘事中不知不知者語受是苦樂二受餘事中使使者乃使不苦不樂受也計无此理也是故此經原如是說欲使捨受乃无明使者應治経初治上勾熟下捨便有无明何者是人扵不苦不樂受中不知集滅故不苦不樂受中无明使使也此去上法字但不苦不樂順下勾若非不苦不樂受无明不使者此治下上上言是人扵此受中不知集滅故苦樂二无明使使二受也云无明不使者不使捨受此治下順上使二受也曰是人扵不苦不樂受中生三種心此荅不湏治経也是人扵該受中亦如實知者政扵弟四禪一捨受中不知是集滅是生死過患故生三種心以為𡨜滅裡勝生不苦不樂心若耶知耶即生樂心若以上地空為勝則生苦心経中云語受不如實知者捨受下何以故釋無一切語受皆无明使是少分一切非通三界一切隨時故為三種異者弟四禪一地随人情為三如上是故佛說無政法扵不苦不樂受何湏云云治経人一解扵語受中不如實知故不苦不樂受无明使者如扵弟四禪地中生耶心故以為樂扵上地腹味則生苦心即扵一捨受生二心二心同扵一境故約無扵苦樂語受不知捨受中无明使使後何湏治経也人若未通達苦集此下一解通三三受所以生煩惱者皆以未窮達四諦悉為无明使已所以徧語不苦不樂者爭為論何治経也現在世受不約自知假作異人曰経中受義執貪曰也過去未來二世受是无不可約知現在世受如捨端不身觸受不自知受云何言如實知也荅曰此経意說人受是故无過此下凡四種荅也此初六識是樂六識是苦六識是苦不不樂雖用樂㑅人名樂用苦作人名人苦不人義異苦約言人如實受苦是故此経意人受苦樂无過者无過去來不可約知過无現在世受自矣以意䏻緣故无各弟二五識是苦樂以意識領受同无上二種過也世有因中說果故第三以五識塵是苦因樂因因中說果名塵為苦樂五識苦樂此約無如實受此苦樂同无上二種過也又是人先受樂受然後身相第四意識是樂該意識還身相領受故問無受樂時如實知同无上二過也問曰為以受者故名受可受故名受此荅不異上四種所以開前問者上未分明制受名義將釋故問自知以火為身識火生樂名受樂者以此受者名受則受与樂果不約言苦受樂受与経相違若以此身識非受者以可受名受持則誰受之者名可受為受也以覺緣故名為受樂此以上弟三荅也火為苦樂身識為受者此荅初勾雖荅以受者名受而与可樂不異以識受苦名苦受何以異也人眾生受此故名可受為受此以上四種荅中弟一人受故无過荅此弟二問也六識是苦是樂為行人所受故可受名受不約無誰受之者便无受者之過矣問曰眾生不名為受真實問也荅曰名義如是者制受名義如是也六識是苦行人受此苦名苦受也雖是心法是實約名要相因假也五受相品此受論中明義身不釋受陰受陰是苐三心苦樂在五識可非也凡云受者領受扵緣根者生後之義三界眾生為憂苦所逼故貪求喜樂便造莫大之罪无窮之原因之即起根之義也苦樂在五識以約識淺中制名憂喜想分別生約識深在意地論主云苦樂至弟四禪四禪中入身故憂喜道心至非非想之為意識故也所以尒者以阿毗曇人無八禪地永無憂苦論主無人乃至非想身耳而制憂苦名在欲界下九次弟定云入初禪滅憂入弟二禪滅苦故可身喜至二禪樂至弟三捨至非想同數経矣云上為憂苦者為者身問曰五識問五塵本為分別分別之後方覺𢙣以為不通苦受也覺好以為通樂受也今五識云何以此力制苦樂受入不同數経異識別為苦樂受同時而想在五識中進退無據論主制苦樂意仍在也荅曰上問受品弟三勾中立名五塵為苦樂此問中語果䏻生苦樂名為苦樂五識託此五塵生領受扵苦領受扵樂何為不約名此五識是受苦樂者此便是受者名受豈湏待分別方生通不通不同数経方別然数之受与心想通也人一解五識為前意識所資雖同色已兼約好𢙣扵好即生樂扵𢙣即生苦豈湏分別然後方生苦樂之情也問曰若五識為意識所能資故生便兼約好𢙣者是五識便約名何以云五識約實法想約名也荅曰五識兼約好𢙣故可約名苦樂受所以但無約實約實法扵色則了耳名不了不如扵想想則故想問名五識兼約名下相品自顯然矣行陰中思品此下凡十一品論行陰行陰以牽生死果報義思見樂主故首明焉願求為思思是業為願求然一而異名下引八經為證下思求願俱下故一然思是業烕果在方將願求名果義同也如說㑅起皆依扵受㑅起是業思也無依受者受為上中下上中下者名思思依上中下有故言依受求与尒迦旃延人思是十大地中一報非受論主解思是受此此者瞋癡尒也又経中說我即是動𩂜計我是橫橫則无根可㨿名動動者或在色上計我或受想行識不一故名動𩂜㑅此度計是或倒故名識論既計我順我則起受上受上者名思思是業業㑅起法依受而有說法依受也凡八勾中明求思一然為求即思即略言文身動𩂜戲論依受三勾相成所以并引問曰汝謂求是思者此是受相非是思也上論主明思是受中上者名業即求思願皆一然而異名今異人引五経以求是𩂜他思他願未詳此人因果願㑅何法分𩂜非迦旃延人也初勾凡人何以𩂜𩂜生求以癡為本則有受生為受故是𩂜求着是故引経題人所以為求即是愛也非思非願因愛故求者是受首九法當故受是求非非思願也苦者多求苦人多受他人好果報所以為求非思願也又汝謂願是是思者是不然此下凡兩勾異人𣸪以知他願先知後造業則重非願重故重也此人以此為思非迦旃延人五部之中不耶願名習此先荅以他願願名集集起未果報非是故欲分願名思者此願然是愛上上品故曰愛分也問曰若欲分願名思者則无无漏思欲分是愛愛是惑惑中重者名思則无漏非惑便无思問以空下无漏无知此起㑅行相之思何妨為无漏断生死之思无漏十業道也又思為愛因論主思是愛果如上外人難思是因因曰異界不約言欲分願為思下引経證成若見思食過如火聚但起未八苦之火則思食愛断食愛断便三界受断可謂因断故果断因自非果云何無分又汝言思是愛因是不然論主不然不然者不然也思是業業是受依下生中依中生上上上品斬以為思非果如何愛果是思思也是業業断故三无量果報愛断此乃果断故因断非因断故果断治道道為法先断塵塵者是果果是思思則是愛此果断故因断也行因緣皆以是方外人上以五難論主八勾解行陰思求願思求願起但之然為未果㑅因緣故云行因緣無眾者八勾解不一無眾皆以是者皆以思是愛果是愛分之思是愛果斬上品愛為思云何以無求是愛非思求是思是願是愛通五経也是故貪為思因此是異人更難論主若思是愛果果則非因不約無分論主貪為思因外人貪為思因因語雜同意則異論主愛為思因思猶是受之上品但斬以為思外人因入此愛生求求是思則思果分絕不約無分下顯然也後業迴向此更以他願主先造業業則重便以為思今先願名業業是思是求後迴向三為身報故重非造業故重觸品觸是六識之業如火是名燒是火業身別是識然扵緣中觸對義名業以此義推一切心行緣无不為此義但経中觸与受想因六識業在胎曰稱餘名也觸但義異扵識在行陰中非如餘數法也是故建云識在緣中名觸此一品中更為二人觸相不同一觸是假名如二木共合不異木三事合名觸不異此三二是迦旃延人計異心別為一觸法力能和合情塵非是觸相者并非二家之所計也根緣不可合在一𩂜云何可住假名義既相云玄絕觸云何為力彊和合也故眾所計非是觸相直是根緣相對識為觸對義義名觸也觸因緣受此下迦旃延人引五経證異餘有一觸法十二因緣中觸為因若當義无禮句䏻為受作因耳也六觸眾六六経者厶為比丘此身中但六六眾无无我我所六內入六外六識六觸六𩂜此外人引此経證別然觸若六內入異外六入何以六觸不約六識也比求雜何含経也又経中應觀无明法觸此人後別経說部主明外色計一种我厶破外色為應觀此身中但為无明觸假而成人人是假无實无明別在觸明成假法因則為理若當觸凢別然但當識受想行滅假法因便起六識上義此假觸故曰不應別假法而厶明无明諸觸當別為一觸說觀矣識生然後受想諸法生心時為因者政是六在為觸對故後受想心次次而生何以不約十二因緣中觸為受因也類荅下勾引六六経還六識在緣即為六觸不為所以故曰是為義也経違法相者即觸是心数法然可記令眼色諸成成分是色一色是心汝秉觸為心非違法相如何一身一次弟緣乃言不心起卄一心故共生為一觸違法相也念品凡四科明念然相二明餘緣䏻生心心未必念生三明一次弟緣四明念為耶正夫論主解義云凡夫識造緣四心次第生無四者我塵對我容識身分明可約弟四為境是速身則未審未必具四自為弟六意地随緣起无量心未必具四無必具四者多語耳論五陰此心非識処受所以類在行陰若十二入門論法唯一次弟緣識識想生生者是意識滅者是根想滅受生類皆如此後心數在法入中可喜品喜是欲中不深所以離之現事所湏中生心名欲性生心所湏為喜猶是欲欲力所以也信品凡三科初明信然相必㝎是慧相是弟二為漏信是信三種訖品明信通也懃品為三科初明然因懃為三種弟二明通行者若信不過𢙣記品弟三明在中与勝名名精進也憶品念緣三世憶緣過去為異三科初明然相此憶三世緣者弟二科明四憶𩂜實是慧憶在始約名云何異識所更記品制憶名義弟三科也念識諸法皆應名憶若當先所受名憶者唯除五識弟六意識緣他者今識者苐六意識緣先所受說法者一切想受行皆緣先所受皆應名憶也云何約為想受行陰也曰今識法是憶是憶然何妨為說陰也五識後所生想受行雖不約現法次識後近生所約法始尒後本与想受名自為弟六意識緣過去次弟生想受煩惱者雖緣過去起四心故名弟六意識自為但生憶不生想受名憶在行陰中也覺觀品三科初就散心中明覺觀弟二攝心明覺觀入散心中為細此應云攝言散出経時誤也尒未現事皆思量此弟三乖理者名覺得理者名觀淺智為覺深智為觀也
